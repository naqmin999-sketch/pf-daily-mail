name: PF Daily Market Intelligence

# KST 오전 8시 = UTC 전날 23:00
# GitHub Actions cron은 UTC 기준이므로 0 23 * * * 로 설정
on:
  schedule:
    - cron: '0 23 * * *'   # 매일 UTC 23:00 = KST 08:00
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 (send: 전체 파이프라인 / diagnose: 연결 진단만)'
        required: false
        default: 'send'
        type: choice
        options:
          - send
          - diagnose

permissions:
  contents: write   # ← 추가: 자동수집된 CSV를 레포에 커밋하기 위해 필요
  models: read      # ← 추가: GitHub Models 무료 LLM 사용 (별도 키·비용 없음)

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ECOS_API_KEY:        ${{ secrets.ECOS_API_KEY }}
      NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}   # (선택) 미설정 시 GitHub Models 무료 사용
      GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}        # ← 추가: GitHub Models 무료 LLM 인증
      EMAIL_SENDER:        ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECIPIENTS:    ${{ secrets.EMAIL_RECIPIENTS }}
      EMAIL_SMTP_HOST:     ${{ secrets.EMAIL_SMTP_HOST }}
      EMAIL_SMTP_PORT:     ${{ secrets.EMAIL_SMTP_PORT }}
      REPORT_TITLE:        "PF Daily Market Intelligence"
      TIMEZONE:            "Asia/Seoul"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 한국어 폰트 설치 (PDF 한글 렌더링)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install --with-deps chromium

      - name: 리포트 생성 및 이메일 발송
        run: |
          if [ "${{ github.event.inputs.mode }}" = "diagnose" ]; then
            python main.py --diagnose
          else
            python main.py
          fi

      # ← 추가: 자동수집으로 갱신된 CSV를 레포에 반영 (다음 실행에서 중복 방지의 기준이 됨)
      - name: 자동수집 CSV 커밋
        if: github.event.inputs.mode != 'diagnose'
        run: |
          git config user.name  "pf-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add manual_data/deal_watch.csv manual_data/credit_ratings.csv
          git diff --cached --quiet || git commit -m "auto: 딜/신용등급 자동수집 $(date +%Y-%m-%d)"
          git push
