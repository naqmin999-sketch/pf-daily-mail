name: PF Daily Market Intelligence

# KST 오전 8시 = UTC 전날 23:00
# GitHub Actions cron은 UTC 기준이므로 0 23 * * * 로 설정
on:
  schedule:
    - cron: '0 23 * * *'   # 매일 UTC 23:00 = KST 08:00
  workflow_dispatch:         # GitHub UI에서 수동 실행 가능

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ECOS_API_KEY:        ${{ secrets.ECOS_API_KEY }}
      NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      EMAIL_SENDER:        ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD:      ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECIPIENTS:    ${{ secrets.EMAIL_RECIPIENTS }}
      EMAIL_SMTP_HOST:     ${{ secrets.EMAIL_SMTP_HOST }}
      EMAIL_SMTP_PORT:     ${{ secrets.EMAIL_SMTP_PORT }}
      REPORT_TITLE:        "PF Daily Market Intelligence"
      TIMEZONE:            "Asia/Seoul"

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 한국어 폰트 설치 (PDF 한글 렌더링)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install --with-deps chromium

      - name: 리포트 생성 및 이메일 발송
        run: python main.py
